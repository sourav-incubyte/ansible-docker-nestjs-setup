[task]
name = "bespokelabs/ansible_docker_setup"
organization = "bespokelabs"
description = "Fix a broken Ansible playbook and NestJS app to deploy a working docker-compose setup with PostgreSQL and a /checkdb endpoint"
version = "0.1.0"

[environment]
name = "ansible_docker_setup"
mounts_json = ["/var/run/docker.sock:/var/run/docker.sock"]

[environment.runtime]
python = "3.12"

[verifier]
mounts_json = ["/var/run/docker.sock:/var/run/docker.sock"]

[verifier.runtime]
system_packages = ["docker.io"]